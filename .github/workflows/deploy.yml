name: Deploy to Pages

on:
  # main 브랜치 업데이트 시
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - ".gitignore"
  # 수동 트리거
  workflow_dispatch:
  # 리포트 생성 파이프라인이 끝난 직후 자동 배포.
  # `GITHUB_TOKEN` 으로 push 한 커밋은 다른 workflow 의 push 트리거를 발화시키지
  # 않는 GitHub Actions 제약 때문에 (무한 루프 방지), generate-reports 의
  # 리포트 커밋을 deploy 로 연결하는 유일한 방법이 workflow_run 체인이다.
  # workflow 이름은 대소문자 정확히 일치해야 한다.
  workflow_run:
    workflows: ["generate-reports"]
    types:
      - completed
    branches: [main]

# Pages 배포에 필요한 최소 권한
permissions:
  contents: read
  pages: write
  id-token: write

# 동시에 여러 배포가 돌면 artifact가 꼬이므로 직렬화.
# cancel-in-progress: false — 진행 중인 배포를 죽이지 않고 다음 커밋은 대기.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    # workflow_run 트리거일 때는 cancelled 가 아니면 진행.
    # generate-reports 가 일부 cell 실패로 failure 상태여도, 성공한 cell 의
    # 리포트는 이미 main 에 push 되어 있으니 배포해야 한다.
    if: >-
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion != 'cancelled'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          # Astro 공식 Pages 가이드 권장
          NODE_ENV: production

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
